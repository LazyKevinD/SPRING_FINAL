<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!--JQUERY-->
  <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
  <script type="text/javascript">
    $(document).ready(function () {
      setTimeout(function () {
        $(".msj").fadeOut(1500);
      }, 3000);
    });
    const micrologin = 'https://abcc-springboot-login.onrender.com/auth/login'
    async function submitear(e) {
      e.preventDefault();
      const usr = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      document.getElementById('btnSubmit').value = 'Autenticando...'
      fetch(micrologin, {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usr, password: pass })
      }).then(res => {
        if (!res.ok) {
          console.error( res.text());
          alert('Usuario o contraseña incorrectos, utilice: \nUsuario: Ras\nContraseña: Acrobacia');
          
          document.getElementById('btnSubmit').value = 'Ingresar'
          return;
        }
        sessionStorage.setItem('logeado', 'true');
        window.location.href = '/';
      })
    }
  </script>
</head>

<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style='width:100%; max-width:400px'>
      <form onsubmit="submitear(event)">

        <h2 class="text-center mb-4"> Inicie sesion</h2>
        <div class="mb-3">
          <label class='form-label' for="username">Usuario: </label>
          <input class='form-control' type="text" name='username' id='username' placeholder='Usuario Valido: Ras' />
          <label class='form-label' for="password">Contraseña: </label>
          <input class='form-control' type="password" name='password' id='password' placeholder='Contraseña Valida: Acrobacia' />
        </div>
        <br />
        <input type="submit" value="Ingresar" class="btn btn-primary full-width w-100" id="btnSubmit" />
      </form>
    </div>
  </div>
</body>

</html>
