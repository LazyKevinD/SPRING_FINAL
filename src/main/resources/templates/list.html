<!doctype html>
<html lang="en">
  <head>
    <meta charset="ISO-8859-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALUMBOS</title>

    <!-- BUSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
    <!--JQUERY-->
    <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
    <script type="text/javascript">
      if(!sessionStorage.getItem('logeado')) window.location.href = '/login' //sencillon
      $(document).ready(function () {
        setTimeout(function () {
          $(".msj").fadeOut(1500);
        }, 3000);
      });
    </script>
  </head>

  <body>
    <header>
      <nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="/">
            <img
              src="../public/assets/images/estudiantes.png"
              class="img-fluid"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarsExample07"
            aria-controls="navbarsExample07"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarsExample07">
            <ul class="navbar-nav mr-auto">
              <li class="nav-item active">
                <a class="nav-link" href="#">INICIO</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Asignaturas</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Docentes</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div class="container mt-5 mb-5">
      <div class="row">
        <div class="col-md-12">
          <h1 style="font-size: 28px; margin-top: 50px" class="text-center">
            CERVICIOS ESCOLARES
          </h1>

          <div class="col-md-10">
            <!--navegacion-->
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb">
                <li class="breadcrumb-item" aria-current="page">Inicio</li>
                <li class="breadcrumb-item active" aria-current="page">
                  Alumnos
                </li>
              </ol>
            </nav>

            <div class="row">
              <div class="col-md-12">
                <div class="content-box-large">
                  <div class="panel-heading">
                    <div class="panel-title">
                      <h2>ALUMNOS</h2>
                    </div>
                  </div>
                  <div class="panel-body">
                    <a th:href="@{/subes}" class="btn btn-success mt-4 ml-3">
                      + agregar
                    </a>

                    <!--Cargar egistro dinamico-->
                    <section class="example mt-4">
                      <table class="table table-hover" id="tabla_alumnos">
                        <thead>
                          <tr>
                            <th>Numero de Control</th>
                            <th>Nombre</th>
                            <th>Primer Ap.</th>
                            <th>Segundo Ap.</th>
                            <th>ACCIONES</th>
                          </tr>
                        </thead>

                        <tbody>
                          <tr th:each="a : ${alumnos}">
                            <td class="v-align-middle" th:text="${a.getNum_control}"></td>
                            <td class="v-align-middle" th:text="${a.getNombre}"></td>
                            <td class="v-align-middle" th:text="${a.getPrimer_ap}"></td>
                            <td class="v-align-middle" th:text="${a.getSegundo_ap}"></td>
                            <td class="v-align-middle">
                              <form
                                th:action="@{/bajas/{id}(id=${a.id})}"
                                method="delete"
                                onsubmit="return confirmarEliminacion();"
                              >
                            
                                <a
                                  th:href="@{/detalles/{id}(id=${a.id})}"
                                  class="btn btn-primary btn-sm"
                                  >Detalles</a
                                >
                                <a
                                  th:href="@{/actualizar/{id}(id=${a.id})}"
                                  class="btn btn-warning btn-sm"
                                  >Editar</a
                                >
                                <button
                                  type="submit"
                                  class="btn btn-danger btn-sm"
                                >
                                  Eliminar
                                </button>
                              </form>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <hr />
    <footer class="text-muted mt-3 mb-3">
      <div align="center">FUTER</div>
    </footer>

    <script type="text/javascript">
      function confirmarEliminacion() {
        return confirm("Seguro que quieres ELIMINAR el alumbo?");
      }
    </script>
  </body>
</html>
